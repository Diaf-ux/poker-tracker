name: Supabase DB Backup

on:
  schedule:
    - cron: '0 3 * * *'   # каждый день в 03:00 UTC (06:00 МСК)
  workflow_dispatch:        # кнопка "запустить вручную" в GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: backups
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILENAME="backup_$(date +%Y%m%d_%H%M%S).sql.gz"
          pg_dump "$SUPABASE_DB_URL" --disable-triggers | gzip > "$FILENAME"
          echo "Backup size: $(du -sh $FILENAME)"

      - name: Delete backups older than 30 days
        run: |
          find . -name "backup_*.sql.gz" -mtime +30 -delete

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup_*.sql.gz
          git diff --cached --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push
