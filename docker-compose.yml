services:
  db:
    image: postgres:16-alpine
    container_name: poker-db
    environment:
      POSTGRES_DB: poker
      POSTGRES_USER: poker
      # secretlint-disable
      POSTGRES_PASSWORD: poker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d poker"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: poker-postgrest
    environment:
      PGRST_DB_URI: postgres://poker:poker@db:5432/poker
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    container_name: poker-app
    ports:
      - "3000:3000"
    depends_on:
      - postgrest

volumes:
  pgdata:
